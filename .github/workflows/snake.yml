name: Generate Snake Animation

on:
  schedule:
    - cron: "0 5 * * *" # roda todo dia às 05:00 UTC (02:00 em São Leopoldo, horário padrão)
  workflow_dispatch: # permite rodar manualmente também, pela aba Actions
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate the snake game from a GitHub user's contributions graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push the generated files to a new branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
